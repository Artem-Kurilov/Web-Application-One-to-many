<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of books</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Manage Books</span>
    </div>
</nav>

<div class="container mt-5">

    <h1 class="text-center mb-4">List of books</h1>

    <div class="text-center mb-4">
        <a th:href="@{/}" class="btn btn-secondary btn-sm">
            Back
        </a>
    </div>

    <div class="text-center mb-4">
        <a th:href="@{/BookController/formAddBook}"
           class="btn btn-primary btn-sm">
            Add new book
        </a>
    </div>

    <table class="table table-dark table-striped table-hover text-center">

        <thead>
        <tr>
            <th>ID</th>
            <th>Author</th>
            <th>Title</th>
            <th>Quantity</th>
            <th>Action</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="book : ${books}">

            <td th:text="${book.id}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.title}"></td>
            <td th:text="${book.quantity}"></td>

            <td>
                <a th:href="@{'/BookController/open/' + ${book.id}}"
                   class="btn btn-info btn-sm">
                    Open
                </a>
            </td>

            <td>
                <a th:href="@{'/BookController/delete/' + ${book.id}}"
                   class="btn btn-danger btn-sm">
                    Delete
                </a>
            </td>

        </tr>

        </tbody>

    </table>

    <!-- Pagination -->
    <nav class="mt-4" th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">

            <!-- PREVIOUS -->
            <li class="page-item"
                th:classappend="${currentPage == 0} ? 'disabled'">

                <a class="page-link"
                   th:href="@{/BookController/ListOfBooks(page=${currentPage - 1})}">
                    &lt;
                </a>

            </li>



            <!-- th:block Group the HTML logic,
                 BUT output nothing to HTML,
                 I need th:block to implement logic that's why i am using it, without it, i can't use conditional statements and loops. -->

            <!-- IF TOTAL PAGES <= 10 -->
            <th:block th:if="${totalPages <= 10}">


                <!-- classappend is adding css style -->

                <!-- th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                     in java: for(int i = 0; i <= totalPages - 1; i++){ -->
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">

                    <a class="page-link"
                       th:text="${i + 1}"
                       th:href="@{/BookController/ListOfBooks(page=${i})}">
                    </a>

                </li>

            </th:block>

            <!-- IF TOTAL PAGES > 10 -->
            <th:block th:if="${totalPages > 10}">

                <!--
                  Если мы еще НЕ дошли до последних 10 страниц:
                  показываем текущие 5 страниц + ... + последние 5 страниц.
                  Если уже дошли до последних 10 страниц:
                  показываем просто последние 10 страниц без троеточия.
                -->

                <!-- MOVING WINDOW + DOTS + LAST 5 -->
                <th:block th:if="${currentPage < totalPages - 10}">

                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(currentPage, currentPage + 4)}"
                        th:classappend="${i == currentPage} ? 'active'">

                        <a class="page-link"
                           th:text="${i + 1}"
                           th:href="@{/BookController/ListOfBooks(page=${i})}">
                        </a>

                    </li>

                    <!-- DOTS -->
                    <li class="page-item disabled">
                        <span class="page-link">...</span>
                    </li>

                    <!-- th:each="i : ${#numbers.sequence(totalPages - 5, totalPages - 1)}">
                         This ensures that, from where I was standing, there were still 5 pages ahead of me. -->
                    <!-- LAST 5 -->
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(totalPages - 5, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">

                        <a class="page-link"
                           th:text="${i + 1}"
                           th:href="@{/BookController/ListOfBooks(page=${i})}">
                        </a>

                    </li>

                </th:block>

                <!-- LAST 10 PAGES WITHOUT DOTS -->
                <th:block th:if="${currentPage >= totalPages - 10}">

                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(totalPages - 10, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">

                        <a class="page-link"
                           th:text="${i + 1}"
                           th:href="@{/BookController/ListOfBooks(page=${i})}">
                        </a>

                    </li>

                </th:block>

            </th:block>

            <!-- NEXT -->
            <li class="page-item"
                th:classappend="${currentPage == totalPages - 1} ? 'disabled'">

                <a class="page-link"
                   th:href="@{/BookController/ListOfBooks(page=${currentPage + 1})}">
                    &gt;
                </a>

            </li>

        </ul>
    </nav>

</div>

<!-- &gt;   = >
     &lt;   = <
     &amp;  = & -->

<!-- '?' and ':'
The ternary operator works like this:
condition ? if TRUE : if FALSE -->

<!-- example in java: for(int i = 0; i <= 5; i++) of this code
            th:each="i : ${#numbers.sequence(0, 5)}" -->

<!-- class="page-link" making button of pagination is beautiful -->

<!-- 'disabled' here
                    <li class="page-item"
                    th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
     This means that the pagination button will be inactive.-->

</body>
</html>
